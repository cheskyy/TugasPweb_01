<!DOCTYPE html>
<html lang="id">
<h1>
    Tabel Nilai Siswa
</h1>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tabel Nilai Siswa</title>
    <style>
        table {
            width: 100%;
            border-collapse: collapse;
            font-family: Arial, sans-serif;
        }
        th, td {
            border: 1px solid #333;
            padding: 10px;
            text-align: left;
        }
        /* Style untuk Header Biru */
        thead th {
            background-color: #0056b3;
            color: white;
            text-align: center;
        }
        /* Baris Isi */
        tbody tr td {
            background-color: #ffffff;
        }
    </style>
</head>
<body>

    <table>
        <thead>
            <tr>
                <th rowspan="2">Nama</th>
                <th colspan="3">Nilai</th>
            </tr>
            <tr>
                <th>Kimia</th>
                <th>Fisika</th>
                <th>Biologi</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td>Sea</td>
                <td>76</td>
                <td>80</td>
                <td>81</td>
            </tr>
            <tr>
                <td>Ceey</td>
                <td>84</td>
                <td>70</td>
                <td>75</td>
            </tr>
            <tr>
                <td>Afina</td>
                <td>96</td>
                <td>70</td>
                <td>71</td>
            </tr>
        </tbody>
    </table>

</body>
</html>
